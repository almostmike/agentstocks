name: Update market data

on:
  workflow_dispatch:
  schedule:
    # GitHub Actions schedules are UTC. 22:17 UTC is after the U.S. close in
    # both daylight and standard time; the updater also gates on market close.
    - cron: "17 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: update-market-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install market-data client
        run: python -m pip install -r requirements-market.txt
      - name: Test snapshot calculations
        run: python -m unittest discover -s tests
      - name: Build adjusted-close snapshot
        run: python scripts/update_market_data.py
      - name: Commit changed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/codex.json data/market.json data/market-history.json
          if git diff --cached --quiet; then
            echo "No new completed market session."
            exit 0
          fi
          git commit -m "update daily market data"
          git push
